<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <!-- browser chrome -->
  <rect width="800" height="420" fill="#F3F4F6" rx="12"/>
  <rect x="0" y="0" width="800" height="40" fill="#E5E7EB" rx="12"/>
  <rect x="0" y="28" width="800" height="12" fill="#E5E7EB"/>
  <circle cx="24" cy="20" r="7" fill="#EF4444"/><circle cx="46" cy="20" r="7" fill="#F59E0B"/><circle cx="68" cy="20" r="7" fill="#10B981"/>
  <rect x="140" y="10" width="380" height="20" fill="white" rx="10"/>
  <text x="330" y="24" font-size="11" fill="#6B7280">claude.ai</text>
  <!-- sidebar -->
  <rect x="0" y="40" width="200" height="380" fill="#1A1A2E"/>
  <rect x="12" y="58" width="176" height="32" fill="#E85D04" rx="8"/>
  <text x="100" y="79" text-anchor="middle" font-size="13" fill="white" font-weight="600">+ 새 대화</text>
  <rect x="12" y="102" width="176" height="28" fill="#262640" rx="6"/>
  <text x="20" y="120" font-size="11" fill="#9CA3AF">📁 마케팅 업무</text>
  <rect x="12" y="136" width="176" height="28" fill="#262640" rx="6"/>
  <text x="20" y="154" font-size="11" fill="#9CA3AF">📁 고객 대응</text>
  <text x="20" y="186" font-size="10" fill="#6B7280">최근 대화</text>
  <rect x="12" y="194" width="176" height="24" fill="#1F1F3A" rx="4"/>
  <text x="20" y="210" font-size="10" fill="#D1D5DB">이메일 초안 작성</text>
  <rect x="12" y="222" width="176" height="24" fill="#1F1F3A" rx="4"/>
  <text x="20" y="238" font-size="10" fill="#D1D5DB">보고서 요약</text>
  <!-- chat area -->
  <rect x="200" y="40" width="600" height="380" fill="white"/>
  <!-- user message -->
  <rect x="430" y="65" width="340" height="60" fill="#FFF7ED" rx="10"/>
  <text x="445" y="85" font-size="12" fill="#374151">고객사 미팅 후 감사 이메일을</text>
  <text x="445" y="102" font-size="12" fill="#374151">써줘. 전문적이고 따뜻한 톤으로.</text>
  <!-- claude message -->
  <circle cx="225" cy="160" r="16" fill="#E85D04"/>
  <text x="225" y="165" text-anchor="middle" font-size="13" fill="white" font-weight="700">C</text>
  <rect x="250" y="140" width="490" height="120" fill="#F9FAFB" rx="10" stroke="#E5E7EB" stroke-width="1"/>
  <text x="266" y="162" font-size="12" fill="#374151" font-weight="600">안녕하세요, [담당자명]님</text>
  <text x="266" y="182" font-size="11" fill="#6B7280">오늘 미팅에 시간 내주셔서 감사합니다. 논의한</text>
  <text x="266" y="198" font-size="11" fill="#6B7280">협업 방향이 매우 기대됩니다. 다음 단계로...</text>
  <rect x="266" y="218" width="80" height="24" fill="#E85D04" rx="6"/>
  <text x="306" y="234" text-anchor="middle" font-size="11" fill="white">복사</text>
  <rect x="356" y="218" width="80" height="24" fill="#F3F4F6" rx="6"/>
  <text x="396" y="234" text-anchor="middle" font-size="11" fill="#374151">재생성</text>
  <!-- input -->
  <rect x="212" y="375" width="560" height="36" fill="#F9FAFB" rx="18" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="232" y="397" font-size="12" fill="#9CA3AF">메시지 입력...</text>
  <circle cx="754" cy="393" r="14" fill="#E85D04"/>
  <text x="754" y="398" text-anchor="middle" font-size="14" fill="white">↑</text>
</svg>
