<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="400" fill="#1e1e2e" rx="12"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="35" fill="#313244" rx="12"/>
  <rect x="0" y="23" width="800" height="12" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="38" cy="17" r="6" fill="#fab387"/><circle cx="56" cy="17" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" text-anchor="middle" font-size="11" fill="#cdd6f4">Claude Code — 바이브 코딩</text>
  <!-- Left: Chat panel -->
  <rect x="0" y="35" width="360" height="365" fill="#1e1e2e"/>
  <text x="20" y="60" font-size="11" fill="#6c7086">대화 내용</text>
  <!-- User message -->
  <rect x="15" y="68" width="320" height="60" fill="#313244" rx="8"/>
  <text x="30" y="86" font-size="10" fill="#fab387" font-weight="600">👤 나</text>
  <text x="30" y="104" font-size="10" fill="#cdd6f4">직원들이 초과근무 신청할 수 있는</text>
  <text x="30" y="119" font-size="10" fill="#cdd6f4">간단한 웹 폼 만들어줘</text>
  <!-- Claude response -->
  <rect x="15" y="138" width="330" height="100" fill="#45475a" rx="8"/>
  <text x="30" y="156" font-size="10" fill="#a6e3a1" font-weight="600">🤖 Claude</text>
  <text x="30" y="174" font-size="10" fill="#cdd6f4">네! HTML 파일을 만들어드릴게요.</text>
  <text x="30" y="191" font-size="10" fill="#cdd6f4">다음 항목을 포함할게요:</text>
  <text x="30" y="208" font-size="10" fill="#89dceb">• 직원명, 부서, 날짜 입력</text>
  <text x="30" y="224" font-size="10" fill="#89dceb">• 초과근무 시간 및 사유</text>
  <!-- Follow-up -->
  <rect x="15" y="250" width="320" height="45" fill="#313244" rx="8"/>
  <text x="30" y="268" font-size="10" fill="#fab387" font-weight="600">👤 나</text>
  <text x="30" y="285" font-size="10" fill="#cdd6f4">제출하면 이메일도 자동 발송되게 해줘</text>
  <rect x="15" y="305" width="330" height="45" fill="#45475a" rx="8"/>
  <text x="30" y="323" font-size="10" fill="#a6e3a1" font-weight="600">🤖 Claude</text>
  <text x="30" y="340" font-size="10" fill="#cdd6f4">EmailJS 연동해서 추가할게요 ✓</text>
  <!-- Input area -->
  <rect x="10" y="360" width="340" height="35" fill="#313244" rx="8"/>
  <text x="25" y="382" font-size="10" fill="#6c7086">다음 요청 입력...</text>
  <!-- Right: Code panel -->
  <rect x="360" y="35" width="440" height="365" fill="#181825"/>
  <rect x="360" y="35" width="440" height="25" fill="#1e1e2e"/>
  <text x="450" y="51" font-size="10" fill="#cdd6f4">overtime-form.html</text>
  <text x="380" y="82" font-size="10" fill="#6c7086" font-family="monospace">1  </text><text x="400" y="82" font-size="10" fill="#89b4fa" font-family="monospace">&lt;!DOCTYPE html&gt;</text>
  <text x="380" y="98" font-size="10" fill="#6c7086" font-family="monospace">2  </text><text x="400" y="98" font-size="10" fill="#89b4fa" font-family="monospace">&lt;html lang=</text><text x="472" y="98" font-size="10" fill="#a6e3a1" font-family="monospace">"ko"</text><text x="496" y="98" font-size="10" fill="#89b4fa" font-family="monospace">&gt;</text>
  <text x="380" y="114" font-size="10" fill="#6c7086" font-family="monospace">3  </text><text x="400" y="114" font-size="10" fill="#89b4fa" font-family="monospace">&lt;head&gt;</text>
  <text x="380" y="130" font-size="10" fill="#6c7086" font-family="monospace">4  </text><text x="410" y="130" font-size="10" fill="#89b4fa" font-family="monospace">&lt;title&gt;</text><text x="450" y="130" font-size="10" fill="#cdd6f4" font-family="monospace">초과근무 신청</text><text x="520" y="130" font-size="10" fill="#89b4fa" font-family="monospace">&lt;/title&gt;</text>
  <text x="380" y="146" font-size="10" fill="#6c7086" font-family="monospace">5  </text><text x="410" y="146" font-size="10" fill="#89b4fa" font-family="monospace">&lt;style&gt;</text>
  <text x="380" y="162" font-size="10" fill="#6c7086" font-family="monospace">6  </text><text x="420" y="162" font-size="10" fill="#cdd6f4" font-family="monospace">body &#123; font-family: sans-serif; </text>
  <text x="380" y="178" font-size="10" fill="#6c7086" font-family="monospace">7  </text><text x="420" y="178" font-size="10" fill="#cdd6f4" font-family="monospace">  max-width: 600px; margin: auto &#125;</text>
  <text x="380" y="194" font-size="10" fill="#6c7086" font-family="monospace">8  </text><text x="420" y="194" font-size="10" fill="#cdd6f4" font-family="monospace">.form-group &#123; margin: 1rem 0 &#125;</text>
  <text x="380" y="210" font-size="10" fill="#6c7086" font-family="monospace">9  </text><text x="420" y="210" font-size="10" fill="#cdd6f4" font-family="monospace">label &#123; display: block; </text>
  <text x="380" y="226" font-size="10" fill="#6c7086" font-family="monospace">10 </text><text x="400" y="226" font-size="10" fill="#89b4fa" font-family="monospace">&lt;/style&gt;</text>
  <text x="380" y="242" font-size="10" fill="#6c7086" font-family="monospace">11 </text><text x="400" y="242" font-size="10" fill="#89b4fa" font-family="monospace">&lt;/head&gt;</text>
  <text x="380" y="258" font-size="10" fill="#6c7086" font-family="monospace">12 </text><text x="400" y="258" font-size="10" fill="#89b4fa" font-family="monospace">&lt;body&gt;</text>
  <text x="380" y="274" font-size="10" fill="#6c7086" font-family="monospace">13 </text><text x="410" y="274" font-size="10" fill="#89b4fa" font-family="monospace">&lt;h1&gt;</text><text x="442" y="274" font-size="10" fill="#cdd6f4" font-family="monospace">초과근무 신청서</text><text x="524" y="274" font-size="10" fill="#89b4fa" font-family="monospace">&lt;/h1&gt;</text>
  <text x="380" y="290" font-size="10" fill="#6c7086" font-family="monospace">14 </text><text x="410" y="290" font-size="10" fill="#89b4fa" font-family="monospace">&lt;form </text><text x="440" y="290" font-size="10" fill="#89dceb" font-family="monospace">onsubmit=</text><text x="497" y="290" font-size="10" fill="#a6e3a1" font-family="monospace">"sendForm()"</text><text x="561" y="290" font-size="10" fill="#89b4fa" font-family="monospace">&gt;</text>
  <!-- Cursor blink -->
  <rect x="565" y="280" width="6" height="12" fill="#f5e0dc" opacity="0.8"/>
  <!-- Status bar -->
  <rect x="360" y="370" width="440" height="30" fill="#89b4fa"/>
  <text x="375" y="389" font-size="9" fill="#1e1e2e">✓ 파일 생성됨  |  HTML  |  UTF-8  |  Claude 자동 생성</text>
</svg>
