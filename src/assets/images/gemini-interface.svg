<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="400" fill="#F3F4F6" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="38" fill="#E5E7EB" rx="12"/>
  <rect x="0" y="26" width="800" height="12" fill="#E5E7EB"/>
  <circle cx="22" cy="18" r="6" fill="#EF4444"/><circle cx="42" cy="18" r="6" fill="#F59E0B"/><circle cx="62" cy="18" r="6" fill="#10B981"/>
  <rect x="130" y="7" width="440" height="20" fill="white" rx="10"/>
  <text x="350" y="21" font-size="10" fill="#6B7280">gemini.google.com</text>
  <!-- Gemini interface -->
  <rect x="0" y="38" width="220" height="362" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Sidebar -->
  <text x="30" y="68" font-size="16" font-weight="700" fill="#1A73E8">Gemini</text>
  <rect x="15" y="82" width="190" height="30" fill="#E8F0FE" rx="6"/>
  <text x="110" y="101" text-anchor="middle" font-size="11" fill="#1A73E8">✏️ 새 대화</text>
  <text x="30" y="132" font-size="10" fill="#6B7280" font-weight="600">최근 대화</text>
  <text x="30" y="152" font-size="11" fill="#374151">📊 3분기 시장 분석</text>
  <text x="30" y="172" font-size="11" fill="#374151">📧 투자자 이메일</text>
  <text x="30" y="192" font-size="11" fill="#374151">🎨 캠페인 아이디어</text>
  <text x="30" y="250" font-size="10" fill="#6B7280" font-weight="600">Gemini 모델</text>
  <rect x="15" y="258" width="190" height="24" fill="#F0F4FD" rx="4"/>
  <text x="110" y="274" text-anchor="middle" font-size="10" fill="#1A73E8">✨ Gemini 2.0 Flash</text>
  <text x="30" y="305" font-size="10" fill="#6B7280">Google 서비스 연결:</text>
  <text x="30" y="322" font-size="10" fill="#34A853">📧 Gmail 연결됨</text>
  <text x="30" y="339" font-size="10" fill="#34A853">📁 Drive 연결됨</text>
  <text x="30" y="356" font-size="10" fill="#34A853">📅 Calendar 연결됨</text>
  <!-- Main chat area -->
  <rect x="220" y="38" width="580" height="362" fill="white"/>
  <!-- Chat content -->
  <text x="510" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1A73E8">✨ Gemini</text>
  <!-- User message -->
  <rect x="380" y="95" width="390" height="55" fill="#E8F0FE" rx="10"/>
  <text x="400" y="117" font-size="11" fill="#374151">오늘 뉴스에서 우리 업계 동향을 파악하고</text>
  <text x="400" y="133" font-size="11" fill="#374151">경쟁사 최신 소식도 정리해줘</text>
  <text x="760" y="144" text-anchor="end" font-size="9" fill="#9CA3AF">방금 전</text>
  <!-- Gemini response -->
  <rect x="240" y="165" width="400" height="140" fill="white" rx="10" stroke="#E8F0FE" stroke-width="2"/>
  <text x="260" y="185" font-size="11" font-weight="600" fill="#1A73E8">🔍 실시간 검색 결과</text>
  <text x="260" y="205" font-size="10" fill="#6B7280">검색 완료: 2분 전</text>
  <text x="260" y="225" font-size="10" fill="#374151" font-weight="600">업계 주요 동향 (오늘):</text>
  <text x="260" y="242" font-size="10" fill="#374151">• 반도체 수요 회복세... <tspan fill="#1A73E8">[Bloomberg]</tspan></text>
  <text x="260" y="258" font-size="10" fill="#374151">• AI 투자 확대 트렌드 지속... <tspan fill="#1A73E8">[WSJ]</tspan></text>
  <text x="260" y="274" font-size="10" fill="#374151" font-weight="600">경쟁사 소식:</text>
  <text x="260" y="290" font-size="10" fill="#374151">• A사 신제품 발표 예정... <tspan fill="#1A73E8">[TechCrunch]</tspan></text>
  <!-- Live search badge -->
  <rect x="560" y="168" width="75" height="20" fill="#34A853" rx="10"/>
  <text x="597" y="182" text-anchor="middle" font-size="9" fill="white">● 실시간 검색</text>
  <!-- Input area -->
  <rect x="240" y="325" width="540" height="50" fill="white" rx="25" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="265" y="354" font-size="11" fill="#9CA3AF">Gemini에게 물어보세요... (실시간 정보 검색 가능)</text>
  <circle cx="760" cy="350" r="16" fill="#1A73E8"/>
  <text x="760" y="355" text-anchor="middle" font-size="13" fill="white">↑</text>
</svg>
