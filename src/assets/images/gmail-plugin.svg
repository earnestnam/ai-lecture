<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="400" fill="#F3F4F6" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="36" fill="#E5E7EB" rx="12"/>
  <rect x="0" y="24" width="800" height="12" fill="#E5E7EB"/>
  <circle cx="22" cy="18" r="6" fill="#EF4444"/><circle cx="42" cy="18" r="6" fill="#F59E0B"/><circle cx="62" cy="18" r="6" fill="#10B981"/>
  <rect x="130" y="8" width="400" height="18" fill="white" rx="9"/>
  <text x="330" y="21" font-size="10" fill="#6B7280">mail.google.com</text>
  <!-- Gmail interface -->
  <rect x="0" y="36" width="800" height="364" fill="white"/>
  <!-- Gmail header -->
  <rect x="0" y="36" width="800" height="50" fill="#F6F8FC"/>
  <text x="70" y="66" font-size="20" font-weight="700" fill="#EA4335">Gmail</text>
  <!-- Compose window -->
  <rect x="140" y="95" width="490" height="295" fill="white" rx="4" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="140" y="95" width="490" height="35" fill="#404040" rx="4"/>
  <rect x="140" y="112" width="490" height="18" fill="#404040"/>
  <text x="160" y="117" font-size="12" fill="white">새 메시지</text>
  <rect x="155" y="145" width="460" height="22" fill="white" stroke="#E5E7EB" stroke-width="1" rx="2"/>
  <text x="165" y="160" font-size="11" fill="#374151">받는사람: kim@company.com</text>
  <rect x="155" y="175" width="460" height="22" fill="white" stroke="#E5E7EB" stroke-width="1" rx="2"/>
  <text x="165" y="190" font-size="11" fill="#374151">제목: 2분기 실적 보고서 공유</text>
  <rect x="155" y="205" width="460" height="140" fill="white" stroke="#E5E7EB" stroke-width="1" rx="2"/>
  <text x="165" y="225" font-size="11" fill="#374151">안녕하세요, 김 팀장님.</text>
  <text x="165" y="243" font-size="11" fill="#374151">2분기 실적 보고서를 공유드립니다.</text>
  <text x="165" y="261" font-size="11" fill="#374151">주요 지표는 다음과 같습니다:</text>
  <text x="165" y="279" font-size="11" fill="#9CA3AF">• 매출: 전분기 대비 12% 증가</text>
  <text x="165" y="295" font-size="11" fill="#9CA3AF">• 신규 고객: 85명 확보</text>
  <text x="165" y="313" font-size="11" fill="#9CA3AF">• 목표 달성률: 94%</text>
  <!-- Claude sidebar -->
  <rect x="640" y="95" width="155" height="295" fill="#FFF7ED" rx="4" stroke="#FDBA74" stroke-width="1.5"/>
  <rect x="640" y="95" width="155" height="35" fill="#E85D04" rx="4"/>
  <rect x="640" y="112" width="155" height="18" fill="#E85D04"/>
  <text x="718" y="117" text-anchor="middle" font-size="11" fill="white" font-weight="700">🤖 Claude 도우미</text>
  <text x="650" y="150" font-size="9" fill="#92400E" font-weight="600">이 이메일을 도와드릴까요?</text>
  <rect x="650" y="160" width="130" height="26" fill="white" rx="5" stroke="#FDBA74" stroke-width="1"/>
  <text x="715" y="177" text-anchor="middle" font-size="9" fill="#374151">✏️ 더 정중하게 수정</text>
  <rect x="650" y="193" width="130" height="26" fill="white" rx="5" stroke="#FDBA74" stroke-width="1"/>
  <text x="715" y="210" text-anchor="middle" font-size="9" fill="#374151">📝 간결하게 요약</text>
  <rect x="650" y="226" width="130" height="26" fill="white" rx="5" stroke="#FDBA74" stroke-width="1"/>
  <text x="715" y="243" text-anchor="middle" font-size="9" fill="#374151">🌐 영어로 번역</text>
  <rect x="650" y="259" width="130" height="26" fill="white" rx="5" stroke="#FDBA74" stroke-width="1"/>
  <text x="715" y="276" text-anchor="middle" font-size="9" fill="#374151">📧 답장 초안 작성</text>
  <rect x="650" y="305" width="130" height="30" fill="#E85D04" rx="5"/>
  <text x="715" y="324" text-anchor="middle" font-size="10" fill="white" font-weight="700">적용하기</text>
  <!-- Extension icon in browser bar -->
  <circle cx="740" cy="18" r="10" fill="#E85D04"/>
  <text x="740" y="23" text-anchor="middle" font-size="11" fill="white">🤖</text>
</svg>
