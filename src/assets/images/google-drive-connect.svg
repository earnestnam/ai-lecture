<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="400" fill="#F3F4F6" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Claude ↔ Google Drive 연동</text>
  <!-- Claude side -->
  <rect x="30" y="50" width="220" height="320" fill="white" rx="10" stroke="#FDBA74" stroke-width="2"/>
  <rect x="30" y="50" width="220" height="45" fill="#E85D04" rx="10"/>
  <rect x="30" y="83" width="220" height="12" fill="#E85D04"/>
  <circle cx="70" cy="72" r="16" fill="white"/>
  <text x="70" y="78" text-anchor="middle" font-size="14">🤖</text>
  <text x="160" y="72" font-size="13" font-weight="700" fill="white">Claude</text>
  <text x="140" y="120" text-anchor="middle" font-size="11" fill="#374151">안녕하세요! 무엇을</text>
  <text x="140" y="137" text-anchor="middle" font-size="11" fill="#374151">도와드릴까요?</text>
  <rect x="50" y="155" width="180" height="40" fill="#FFF7ED" rx="8"/>
  <text x="140" y="171" text-anchor="middle" font-size="10" fill="#92400E">Google Drive 파일을</text>
  <text x="140" y="186" text-anchor="middle" font-size="10" fill="#92400E">분석해드릴 수 있어요</text>
  <text x="140" y="220" text-anchor="middle" font-size="10" fill="#6B7280">연결된 서비스:</text>
  <rect x="50" y="230" width="80" height="28" fill="#4285F4" rx="6"/>
  <text x="90" y="248" text-anchor="middle" font-size="9" fill="white">📁 Drive</text>
  <rect x="140" y="230" width="90" height="28" fill="#34A853" rx="6"/>
  <text x="185" y="248" text-anchor="middle" font-size="9" fill="white">📧 Gmail</text>
  <rect x="50" y="268" width="80" height="28" fill="#FBBC04" rx="6"/>
  <text x="90" y="286" text-anchor="middle" font-size="9" fill="#333">📅 Calendar</text>
  <rect x="140" y="268" width="90" height="28" fill="#EA4335" rx="6"/>
  <text x="185" y="286" text-anchor="middle" font-size="9" fill="white">📄 Docs</text>
  <!-- Arrow -->
  <text x="280" y="210" text-anchor="middle" font-size="28" fill="#E85D04">⇄</text>
  <text x="280" y="232" text-anchor="middle" font-size="9" fill="#6B7280">파일 공유</text>
  <text x="280" y="246" text-anchor="middle" font-size="9" fill="#6B7280">실시간 연동</text>
  <!-- Google Drive side -->
  <rect x="330" y="50" width="440" height="320" fill="white" rx="10" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="330" y="50" width="440" height="40" fill="#4285F4" rx="10"/>
  <rect x="330" y="78" width="440" height="12" fill="#4285F4"/>
  <text x="370" y="74" font-size="13" font-weight="700" fill="white">📁 Google Drive</text>
  <!-- File list -->
  <text x="350" y="115" font-size="11" fill="#6B7280" font-weight="600">내 드라이브</text>
  <rect x="345" y="125" width="400" height="36" fill="#E8F0FE" rx="6"/>
  <text x="375" y="140" font-size="20">📊</text>
  <text x="405" y="140" font-size="12" fill="#1A73E8" font-weight="600">2분기_실적보고서.xlsx</text>
  <text x="405" y="155" font-size="10" fill="#9CA3AF">수정: 오늘 오전 10:23</text>
  <text x="710" y="148" text-anchor="middle" font-size="10" fill="#E85D04" font-weight="600">✓ Claude 분석중</text>
  <rect x="345" y="168" width="400" height="36" fill="white" rx="6" stroke="#E5E7EB" stroke-width="1"/>
  <text x="375" y="183" font-size="20">📄</text>
  <text x="405" y="183" font-size="12" fill="#374151">마케팅_전략_v3.docx</text>
  <text x="405" y="198" font-size="10" fill="#9CA3AF">수정: 어제</text>
  <rect x="345" y="211" width="400" height="36" fill="white" rx="6" stroke="#E5E7EB" stroke-width="1"/>
  <text x="375" y="226" font-size="20">📋</text>
  <text x="405" y="226" font-size="12" fill="#374151">팀_미팅_노트_7월.docx</text>
  <text x="405" y="241" font-size="10" fill="#9CA3AF">수정: 3일 전</text>
  <!-- Claude analysis result -->
  <rect x="345" y="260" width="400" height="95" fill="#FFF7ED" rx="8" stroke="#FDBA74" stroke-width="1"/>
  <text x="360" y="280" font-size="11" font-weight="700" fill="#92400E">🤖 Claude 분석 결과:</text>
  <text x="360" y="298" font-size="10" fill="#374151">• 매출 12% 성장, 목표 대비 94% 달성</text>
  <text x="360" y="314" font-size="10" fill="#374151">• 3분기 주요 리스크: 원가 상승 압박</text>
  <text x="360" y="330" font-size="10" fill="#374151">• 추천 조치: 고마진 제품군 집중 전략</text>
  <text x="360" y="348" font-size="10" fill="#9CA3AF">출처: 2분기_실적보고서.xlsx (p.4, 12)</text>
</svg>
