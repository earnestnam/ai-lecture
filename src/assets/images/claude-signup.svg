<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="400" fill="#F3F4F6" rx="12"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" fill="#E5E7EB" rx="12"/>
  <rect x="0" y="28" width="800" height="12" fill="#E5E7EB"/>
  <circle cx="24" cy="20" r="7" fill="#EF4444"/><circle cx="46" cy="20" r="7" fill="#F59E0B"/><circle cx="68" cy="20" r="7" fill="#10B981"/>
  <rect x="140" y="10" width="440" height="20" fill="white" rx="10"/>
  <text x="360" y="24" font-size="11" fill="#6B7280">claude.ai</text>
  <!-- Page bg -->
  <rect x="0" y="40" width="800" height="360" fill="white"/>
  <!-- Claude logo area -->
  <circle cx="400" cy="105" r="35" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="400" y="113" text-anchor="middle" font-size="28">🤖</text>
  <text x="400" y="160" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Claude에 오신 것을 환영합니다</text>
  <text x="400" y="182" text-anchor="middle" font-size="13" fill="#6B7280">Anthropic의 AI 어시스턴트</text>
  <!-- Sign up form -->
  <rect x="260" y="200" width="280" height="48" fill="#E85D04" rx="10"/>
  <text x="400" y="228" text-anchor="middle" font-size="14" fill="white" font-weight="700">Google로 계속하기</text>
  <text x="400" y="268" text-anchor="middle" font-size="12" fill="#6B7280">또는</text>
  <rect x="260" y="280" width="280" height="44" fill="white" rx="10" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="400" y="306" text-anchor="middle" font-size="13" fill="#374151">이메일로 가입하기</text>
  <text x="400" y="355" text-anchor="middle" font-size="11" fill="#9CA3AF">이미 계정이 있으신가요? <tspan fill="#E85D04">로그인</tspan></text>
  <!-- Steps indicator -->
  <rect x="30" y="45" width="130" height="350" fill="#FFF7ED" rx="8"/>
  <text x="95" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">가입 순서</text>
  <circle cx="95" cy="100" r="12" fill="#E85D04"/>
  <text x="95" y="105" text-anchor="middle" font-size="11" fill="white" font-weight="700">1</text>
  <text x="95" y="125" text-anchor="middle" font-size="10" fill="#374151">claude.ai 접속</text>
  <line x1="95" y1="117" x2="95" y2="148" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="95" cy="160" r="12" fill="#E85D04"/>
  <text x="95" y="165" text-anchor="middle" font-size="11" fill="white" font-weight="700">2</text>
  <text x="95" y="185" text-anchor="middle" font-size="10" fill="#374151">Google 계정</text>
  <text x="95" y="199" text-anchor="middle" font-size="10" fill="#374151">연동 클릭</text>
  <line x1="95" y1="212" x2="95" y2="228" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="95" cy="240" r="12" fill="#E85D04"/>
  <text x="95" y="245" text-anchor="middle" font-size="11" fill="white" font-weight="700">3</text>
  <text x="95" y="265" text-anchor="middle" font-size="10" fill="#374151">이용약관 동의</text>
  <line x1="95" y1="278" x2="95" y2="298" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="95" cy="310" r="12" fill="#10B981"/>
  <text x="95" y="316" text-anchor="middle" font-size="14" fill="white">✓</text>
  <text x="95" y="336" text-anchor="middle" font-size="10" fill="#374151">완료!</text>
  <text x="95" y="350" text-anchor="middle" font-size="10" fill="#374151">바로 사용 가능</text>
</svg>
