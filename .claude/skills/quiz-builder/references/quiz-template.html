<!-- quiz-template.html — 퀴즈 UI 뼈대 (quiz-builder 스킬 참조용) -->
<section class="quiz-section">
  <div class="quiz-container">
    <!-- 진행 표시 -->
    <div class="quiz-progress">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quizProgressFill"></div>
      </div>
      <span class="quiz-progress-text" id="quizProgressText">1 / 10</span>
    </div>

    <!-- 질문 영역 -->
    <div class="quiz-question" id="quizQuestion">
      <h2 class="question-text" id="questionText"></h2>
      <div class="question-options" id="questionOptions">
        <!-- 선택지는 JS로 동적 생성 -->
      </div>
    </div>

    <!-- 결과 영역 (처음에는 숨김) -->
    <div class="quiz-result hidden" id="quizResult">
      <div class="result-level">
        <span class="result-level-number" id="resultLevel"></span>
        <h2 class="result-title" id="resultTitle"></h2>
      </div>
      <p class="result-description" id="resultDescription"></p>
      <div class="result-recommendation">
        <h3>추천 학습 경로</h3>
        <ul id="recommendedPages"></ul>
      </div>
      <button class="btn btn--primary" id="retakeQuiz">다시 진단하기</button>
    </div>
  </div>
</section>
